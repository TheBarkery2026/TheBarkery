<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Feedback - The Barkery</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="admin-styles.Se2.css" rel="stylesheet" />
  </head>
  <body>
    <aside class="admin-sidebar">
      <div class="sidebar-logo"><img src="images/Logo - Black.png" alt="The Barkery Logo" /></div>
      <ul class="sidebar-nav">
        <li><a href="ManProd.Se2.html"><i class="fas fa-box"></i> <span>Manage Products</span></a></li>
        <li><a href="ManCon.Se2.html"><i class="fas fa-file-alt"></i> <span>Manage Content</span></a></li>
        <li><a href="ManOrd.Se2.html"><i class="fas fa-clipboard-list"></i> <span>Manage Order</span></a></li>
        <li><a href="ManStock.Se2.html"><i class="fas fa-pen"></i> <span>Manage Stocks</span></a></li>
        <li><a href="ManFeedback.Se2.html" class="active"><i class="fas fa-comments"></i> <span>Customer Feedback</span></a></li>
        <li><a href="ManRep.Se2.html"><i class="fas fa-chart-pie"></i> <span>Manage Reports</span></a></li>
      </ul>
      <div class="sidebar-user">
        <div class="sidebar-avatar"><i class="fas fa-user"></i></div>
        <div class="sidebar-user-info">
          <span class="user-name">ADMIN</span>
          <span class="user-email">admin@gmail.com</span>
          <button class="btn btn-danger btn-sm mt-2 w-100" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>
    </aside>

    <div class="admin-main">
      <div class="admin-topbar"><h3>Customer Feedback</h3></div>
      <div class="admin-content">
        <div class="products-toolbar">
          <button class="btn-admin-danger" onclick="openDeleteModal()"><i class="fas fa-trash"></i> Delete Feedback</button>
        </div>
        <div class="product-cards" id="feedbackCards"></div>
      </div>
    </div>

    <!-- View Modal -->
    <div class="modal-overlay" id="viewFeedbackModal">
      <div class="order-info-modal" style="width:480px;max-width:92%">
        <button class="modal-close-btn" onclick="closeModal('viewFeedbackModal')">&times;</button>
        <h5><i class="fas fa-comment-dots me-2"></i>Feedback Details</h5>
        <hr />
        <div class="mb-2"><label class="fw-bold d-block mb-1">Customer Name</label><p id="modalCustomerName" class="mb-1"></p></div>
        <div class="mb-2"><label class="fw-bold d-block mb-1">Feedback Date</label><p id="modalFeedbackDate" class="mb-1"></p></div>
        <div class="mb-2"><label class="fw-bold d-block mb-1">Rating</label><p id="modalRating" class="mb-1"></p></div>
        <div class="mb-2"><label class="fw-bold d-block mb-1">Feedback</label><p id="modalCustomerFeedback" class="mb-1" style="white-space:pre-wrap"></p></div>
        <div style="text-align:right;margin-top:1rem">
          <button class="btn-admin-outline" onclick="closeModal('viewFeedbackModal')">Close</button>
        </div>
      </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal-overlay" id="deleteModal">
      <div class="order-info-modal" style="width:340px;max-width:92%">
        <button class="modal-close-btn" onclick="closeModal('deleteModal')">&times;</button>
        <h5>Delete Feedback</h5>
        <p style="font-size:0.85rem;color:var(--text-gray);margin-bottom:1rem;">Are you sure you want to delete this feedback entry?</p>
        <div style="text-align:right;margin-top:1rem">
          <button class="btn-admin-outline me-2" onclick="closeModal('deleteModal')">Cancel</button>
          <button class="btn-admin-danger" id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>

    <div class="admin-toast" id="adminToast"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
      import { getFirestore, collection, getDocs, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBV5wWoUZDeJYSADjLvQTvAPwggwAppeTI",
        authDomain: "grp2-se.firebaseapp.com", projectId: "grp2-se",
        storageBucket: "grp2-se.firebasestorage.app",
        messagingSenderId: "488325990404",
        appId: "1:488325990404:web:2f885df16b18d9057a8d51",
        measurementId: "G-PDT5LV9JX1",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const feedbackCards = document.getElementById("feedbackCards");
      const toast = document.getElementById("adminToast");
      const deleteBtn = document.querySelector(".btn-admin-danger");
      let selectedFeedback = null;

      window.showToast = (msg) => { toast.textContent = msg; toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 2500); };
      window.closeModal = (id) => document.getElementById(id).classList.remove("show");

      function renderStars(rating) {
        const n = parseInt(rating) || 0;
        return Array.from({length:5}, (_,i) => `<span class="${i<n?"star-rating":"star-empty"}">★</span>`).join("");
      }

      function formatDate(value) {
        if (!value) return "—";
        if (value?.toDate) return value.toDate().toLocaleDateString("en-PH", { year:"numeric", month:"short", day:"numeric" });
        const d = new Date(value);
        return isNaN(d) ? value : d.toLocaleDateString("en-PH", { year:"numeric", month:"short", day:"numeric" });
      }

      function updateButtonStates() { deleteBtn.classList.toggle("btn-disabled", !selectedFeedback); }

      /* Feedback card colour based on rating */
      function accentByRating(r) {
        const n = parseInt(r) || 0;
        if (n >= 5) return "#c9a876";
        if (n >= 3) return "#f5a623";
        return "#f44336";
      }

      async function fetchFeedbacks() {
        feedbackCards.innerHTML = "";
        const snapshot = await getDocs(query(collection(db, "feedbacks"), orderBy("Feedback_Date", "desc")));
        if (snapshot.empty) {
          feedbackCards.innerHTML = `<p style="padding:1.5rem;color:var(--text-gray);grid-column:1/-1;">No feedback entries found.</p>`;
          updateButtonStates(); return;
        }

        snapshot.forEach((docSnap) => {
          const f = docSnap.data();
          const accent = accentByRating(f.Rating);
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `
            <!-- Coloured top strip as "image area" replacement -->
            <div class="product-card-image" style="background:${accent}18; aspect-ratio:unset; min-height:70px; justify-content:flex-start; align-items:flex-end; padding:0.75rem 0.9rem;">
              <span class="star-val" style="border-color:${accent}; background:white;">
                <i class="fas fa-star" style="color:${accent};"></i> ${f.Rating ?? "—"}/5
              </span>
            </div>
            <div class="product-card-body">
              <div class="pc-customer-name">${f.Customer_Name ?? "Anonymous"}</div>
              <div class="pc-date"><i class="fas fa-calendar-alt me-1"></i>${formatDate(f.Feedback_Date)}</div>
              <div class="pc-rating-row">${renderStars(f.Rating)}</div>
              <div class="pc-feedback-preview">${f.Customer_Feedback ?? ""}</div>
            </div>
          `;
          card.onclick = () => {
            document.querySelectorAll(".product-card").forEach(c => c.classList.remove("selected"));
            card.classList.add("selected");
            selectedFeedback = { id: docSnap.id, ...f };
            updateButtonStates();
            openViewModal(selectedFeedback);
          };
          feedbackCards.appendChild(card);
        });
        updateButtonStates();
      }

      function openViewModal(f) {
        document.getElementById("modalCustomerName").textContent = f.Customer_Name ?? "Anonymous";
        document.getElementById("modalFeedbackDate").textContent = formatDate(f.Feedback_Date);
        document.getElementById("modalRating").innerHTML = `${renderStars(f.Rating)} <span style="font-size:.85rem;color:var(--text-gray);margin-left:4px;">(${f.Rating ?? "—"}/5)</span>`;
        document.getElementById("modalCustomerFeedback").textContent = f.Customer_Feedback ?? "No feedback text provided.";
        document.getElementById("viewFeedbackModal").classList.add("show");
      }

      window.openDeleteModal = () => {
        if (!selectedFeedback) return showToast("Select a feedback entry first");
        document.getElementById("deleteModal").classList.add("show");
      };

      document.getElementById("confirmDeleteBtn").onclick = async () => {
        if (!selectedFeedback) return;
        await deleteDoc(doc(db, "feedbacks", selectedFeedback.id));
        showToast("Feedback deleted!"); closeModal("deleteModal"); selectedFeedback = null; fetchFeedbacks();
      };

      fetchFeedbacks();
      document.getElementById("logoutBtn")?.addEventListener("click", () => { localStorage.clear(); sessionStorage.clear(); window.location.href = "Adminlogin.Se2.html"; });
    </script>
  </body>
</html>
