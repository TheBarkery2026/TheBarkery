<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - The Barkery</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link href="auth-styles.Se2.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="breadcrumb-nav">
      <div class="breadcrumb-container">
        <a href="index.html" class="breadcrumb-link">
          <i class="fas fa-home"></i> Home
        </a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">Login</span>
        <span class="breadcrumb-current"><strong>ADMIN</strong></span>
      </div>
    </nav>

    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-left">
          <div class="auth-logo">
            <a href="index.html" title="Back to Home">
              <img src="images/Logo - Black.png" alt="The Barkery Logo" />
            </a>
            <p><strong>Log In to Dashboard</strong></p>
          </div>

          <form class="auth-form" id="loginForm" novalidate>
            <div class="form-group">
              <div class="floating-input">
                <input
                  type="text"
                  id="OWN_Email"
                  name="OWN_Email"
                  placeholder=" "
                  required
                  autocomplete="email"
                />
                <label for="OWN_Email">
                  Email Address <span class="required">*</span>
                </label>
              </div>
              <div
                class="field-error"
                id="emailError"
                style="
                  color: red;
                  font-size: 0.8rem;
                  margin-top: 4px;
                  display: none;
                "
              ></div>
            </div>

            <div class="form-group">
              <div class="floating-input">
                <input
                  type="password"
                  id="OWN_Password"
                  name="OWN_Password"
                  placeholder=" "
                  required
                  autocomplete="current-password"
                />
                <label for="OWN_Password">
                  Password <span class="required">*</span>
                </label>
                <button
                  type="button"
                  class="toggle-password"
                  onclick="togglePassword('OWN_Password')"
                  aria-label="Toggle password visibility"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <div
                class="field-error"
                id="passwordError"
                style="
                  color: red;
                  font-size: 0.8rem;
                  margin-top: 4px;
                  display: none;
                "
              ></div>
            </div>

            <!-- Forgot Password Link -->
            <div
              class="auth-links"
              style="
                margin-top: -0.5rem;
                margin-bottom: -0.25rem;
                text-align: right;
              "
            >
              <a
                href="Forgotpassword.Se2.html"
                class="forgot-link"
                style="display: inline; font-size: 0.85rem"
              >
                <i class="fas fa-lock" style="font-size: 0.75rem"></i> Forgot
                Password?
              </a>
            </div>

            <button type="submit" class="btn-auth">
              <span class="btn-text">LOGIN</span>
              <span class="btn-loader" style="display: none">
                <i class="fas fa-spinner fa-spin"></i> Logging in...
              </span>
            </button>

            <div class="form-message" id="formMessage"></div>
          </form>
        </div>

        <div class="auth-right">
          <img src="images/adminlogin.png" alt="Admin Login Illustration" />
        </div>
      </div>
    </div>

    <div
      id="lockoutToast"
      class="toast align-items-center text-bg-danger border-0"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
      style="
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        display: none;
        z-index: 1055;
      "
    >
      <div class="d-flex">
        <div class="toast-body">
          Too many failed attempts. Please wait 5 min.
        </div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          onclick="
            document.getElementById('lockoutToast').style.display = 'none'
          "
        ></button>
      </div>
    </div>

    <footer class="auth-footer">
      <div class="footer-content">
        <div class="footer-logo">
          <img src="images/B_logo_black.png" id="B_logo" alt="The Barkery B" />
          <img src="images/Logo - Black.png" alt="The Barkery Logo" />
        </div>
        <div class="footer-copyright">© 2025 The Barkery</div>
        <div class="footer-location">Angeles City, Pampanga</div>
      </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

    <script>
      // Admin credentials
      const OWN_Credentials = [
        { email: "barkertest462@gmail.com", password: "Adm1n89457" },
        { email: "appbarkery@gmail.com", password: "@dmIn458-3" },
      ];

      const loginForm = document.getElementById("loginForm");
      const emailInput = document.getElementById("OWN_Email");
      const passwordInput = document.getElementById("OWN_Password");
      const btnText = document.querySelector(".btn-text");
      const btnLoader = document.querySelector(".btn-loader");
      const formMessage = document.getElementById("formMessage");
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");
      const loginButton = loginForm.querySelector("button[type='submit']");

      // Clear Errors on Input
      emailInput.addEventListener("input", () => {
        emailInput.style.border = "";
        emailError.style.display = "none";
        emailError.textContent = "";
      });

      passwordInput.addEventListener("input", () => {
        passwordInput.style.border = "";
        passwordError.style.display = "none";
        passwordError.textContent = "";
      });

      // Lockout Status Saving
      let failedAttempts =
        parseInt(localStorage.getItem("adminFailedAttempts")) || 0;
      const lockUntil = parseInt(localStorage.getItem("adminLockUntil"));

      if (lockUntil && Date.now() < lockUntil) {
        loginButton.disabled = true;
        document.getElementById("lockoutToast").style.display = "block";
        passwordError.style.display = "block";
        passwordError.textContent =
          "Too many failed attempts. Please wait 5 minutes.";
        setTimeout(() => {
          loginButton.disabled = false;
          document.getElementById("lockoutToast").style.display = "none";
          passwordError.style.display = "none";
          passwordError.textContent = "";
          localStorage.removeItem("adminLockUntil");
          failedAttempts = 0;
          localStorage.setItem("adminFailedAttempts", failedAttempts);
        }, lockUntil - Date.now());
      }

      // Form Submit
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Reset Errors
        emailInput.style.border = "";
        passwordInput.style.border = "";
        emailError.style.display = "none";
        emailError.textContent = "";
        passwordError.style.display = "none";
        passwordError.textContent = "";
        formMessage.innerHTML = "";

        btnText.style.display = "none";
        btnLoader.style.display = "inline-block";

        // Empty Field Check
        if (!email || !password) {
          if (!email) {
            emailInput.style.border = "1px solid red";
            emailError.style.display = "block";
            emailError.textContent = "Email address is required.";
          }
          if (!password) {
            passwordInput.style.border = "1px solid red";
            passwordError.style.display = "block";
            passwordError.textContent = "Password is required.";
          }
          btnText.style.display = "inline-block";
          btnLoader.style.display = "none";
          return;
        }

        // Credential check
        const isValid = OWN_Credentials.some(
          (c) => c.email === email && c.password === password,
        );
        if (isValid) {
          try {
            const response = await fetch("sendotp.php", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: "email=" + encodeURIComponent(email),
            });

            const resultRaw = (await response.text()).trim();
            const result = resultRaw.includes("OTP_SENT")
              ? "OTP_SENT"
              : resultRaw;

            if (response.ok && result === "OTP_SENT") {
              window.location.href =
                "emailver.Se2.html?email=" +
                encodeURIComponent(email) +
                "&mode=admin";
            } else {
              btnText.style.display = "inline-block";
              btnLoader.style.display = "none";
              formMessage.style.color = "red";
              formMessage.textContent =
                "Failed to send OTP. Try again. (" + result + ")";
            }
          } catch (err) {
            btnText.style.display = "inline-block";
            btnLoader.style.display = "none";
            formMessage.style.color = "red";
            formMessage.textContent = "Server error. Please try again.";
          }
        } else {
          // Wrong credentials
          btnText.style.display = "inline-block";
          btnLoader.style.display = "none";

          failedAttempts++;
          localStorage.setItem("adminFailedAttempts", failedAttempts);

          const remaining = 3 - failedAttempts;
          const attemptsText =
            remaining > 0
              ? ` ${remaining} attempt${remaining !== 1 ? "s" : ""} remaining.`
              : "";

          emailInput.style.border = "1px solid red";
          passwordInput.style.border = "1px solid red";
          passwordError.style.display = "block";
          passwordError.textContent =
            "Invalid email or password." + attemptsText;

          // Lockout After 3 Failed Attempts
          if (failedAttempts >= 3) {
            const lockTime = 5 * 60 * 1000;
            const unlockAt = Date.now() + lockTime;
            localStorage.setItem("adminLockUntil", unlockAt);
            loginButton.disabled = true;
            passwordError.textContent =
              "Too many failed attempts. Please wait 5 minutes.";
            document.getElementById("lockoutToast").style.display = "block";
            setTimeout(() => {
              loginButton.disabled = false;
              document.getElementById("lockoutToast").style.display = "none";
              passwordError.style.display = "none";
              passwordError.textContent = "";
              failedAttempts = 0;
              localStorage.setItem("adminFailedAttempts", failedAttempts);
              localStorage.removeItem("adminLockUntil");
            }, lockTime);
          }
        }
      });

      // Password Reveal Toggle
      function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const icon = input.parentElement.querySelector(".toggle-password i");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }
    </script>
  </body>
</html>
